<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息通知</title>
  <link rel="stylesheet" href="/common-navbar.css">
  <script src="/shell-embed-guard.js" data-shell-view="notifications"></script>
  <style>
    @view-transition {
      navigation: auto;
    }
    @keyframes page-fade-in {
      from { opacity: .96; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes page-fade-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: .98; transform: translateY(-6px); }
    }
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: .18s;
      animation-timing-function: ease;
    }
    ::view-transition-old(root) { animation-name: page-fade-out; }
    ::view-transition-new(root) { animation-name: page-fade-in; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:#ffffff;
      margin:0;
      color:#111827;
    }
    html.embedded-shell body,
    body.embedded-shell {
      background: transparent;
      overflow-x: hidden;
    }
    html.embedded-shell .navbar,
    html.embedded-shell .sidebar,
    body.embedded-shell .navbar,
    body.embedded-shell .sidebar {
      display: none;
    }
    html.embedded-shell .main-layout,
    body.embedded-shell .main-layout {
      display: block;
      padding-top: 0;
    }
    html.embedded-shell .content-area,
    body.embedded-shell .content-area {
      padding: 16px;
    }
    html.embedded-shell .page,
    body.embedded-shell .page {
      max-width: none;
      padding-bottom: 24px;
    }
    .btn-login {
      padding: 8px 20px;
      background: #1e80ff;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-login:hover { background: #1168d4; }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
      font-size: 14px;
      font-weight: 500;
      color: #111827;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1e80ff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-dropdown {
      display: none;
      position: absolute;
      top: 120%;
      right: 0;
      background: #fff;
      border: 1px solid #ebebeb;
      border-radius: 12px;

      overflow: hidden;

    .user-dropdown a {

      width: 200px;
      position: sticky;
      top: var(--navbar-height);
      height: calc(100vh - var(--navbar-height));

      gap: 8px;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all .2s;

    .nav-item:hover {

      color: #111827;
    }
    .nav-item.active {

    }
    .nav-item span.icon {

    .nav-item svg {

      height: 22px;

    .content-area {
      flex: 1;
      min-width: 0;

    .page {
      max-width: 960px;
      margin: 0;
      padding: 0 0 48px;

    .search-bar {
      padding: 0 24px 16px;

    }
    .search-input-wrap {

      display:flex;

      color:#fff;

      margin-right:14px;

    .avatar img {

    }
    .content {

    .nickname {

    .comment-snippet {

    }
    .u-link:hover,

      text-decoration: underline;

    .nickname .u-link {
      color: #111827;
    }
    .desc .blog-link {
      color: #4b5563;
    }
    .empty {
      padding:60px 12px;
      text-align:center;
      color:#9ca3af;
      font-size:14px;
    }
    .action-btn {
      margin-left:16px;
      border-radius:999px;
      padding:8px 20px;
      font-size:13px;
      border:none;
      cursor:pointer;
      background:#ff3b59;
      color:#fff;
      flex-shrink:0;
    }
    .item-read-btn {
      margin-left:16px;
      border-radius:999px;
      padding:8px 14px;
      font-size:12px;
      border:1px solid #e5e7eb;
      background:#fff;
      color:#374151;
      cursor:pointer;
      flex-shrink:0;
    }
    .item-read-btn:hover {
      background:#f9fafb;
    }
    .mark-read-btn {
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #374151;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
    }
    .mark-read-btn:hover {
      background: #f9fafb;
    }
    .notif-dot {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 9px;
      padding: 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      pointer-events: none;
    }
    .toolbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 12px 40px 0;

    }
    .toolbar-actions {
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .filter-btn {
      border:1px solid #e5e7eb;
      background:#ffffff;

      border-radius:999px;

    .filter-btn.active {

      color:#fff;
      border-color:#111827;
    }
    .pager {
      display:flex;
      justify-content:space-between;

      padding:16px 0 8px;
      gap:12px;

    .pager-info {
      color:#6b7280;
      font-size:13px;
    }
    .pager-actions {
      display:flex;
      gap:8px;
    }
    .pager-btn {
      border:1px solid #e5e7eb;
      background:#fff;
      color:#111827;
      font-size:13px;
      padding:6px 12px;
      border-radius:999px;
      cursor:pointer;
    }
    .pager-btn:disabled {
      cursor:default;
      opacity:.45;
    }

    @media (max-width: 1100px) {
      .main-layout {
        flex-direction: column;
      }
      .sidebar {
        position: static;
        width: 100%;
        height: auto;
        padding: 20px 24px 0;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .content-area {
        width: 100%;
      }
    }

    @media (max-width: 768px) {
      .wrap,
      .toolbar {
        padding-left: 16px;
        padding-right: 16px;
      }
      .sidebar {
        padding-left: 16px;
        padding-right: 16px;
      }
      .item {
        align-items: flex-start;
      }
    }
  </style>
</head>

<script src="/site-navigation.js"></script>

<script>
  async function request(url, options = {}) {
    try {
      const res = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
      return await res.json();
    } catch (e) {
      return { code: -1, message: '网络请求失败' };
    }
  }

  function formatTime(t) {
    if (!t) return '';
    // 统一时间解析：后端可能返回不带时区的字符串（如 2026-03-11 12:30:00）
    // 浏览器会按“本地时间”解析，导致与数据库/服务端真实含义不一致。
    // 这里的策略：
    // 1) 若 t 是不带 Z / 时区偏移的字符串，则按 UTC 解析（补 Z）
    // 2) 再固定用北京时间(Asia/Shanghai)格式化展示
    let d;
    if (typeof t === 'string') {
      const s = t.trim();
      const hasTz = /([zZ]|[+-]\d{2}:?\d{2})$/.test(s);
      if (!hasTz && /^\d{4}-\d{2}-\d{2}/.test(s)) {
        // 兼容 'YYYY-MM-DD HH:mm:ss' 与 'YYYY-MM-DDTHH:mm:ss'
        const iso = s.includes('T') ? s : s.replace(' ', 'T');
        d = new Date(iso + 'Z');
      } else {
        d = new Date(s);
      }
    } else {
      d = new Date(t);
    }
    try {
      const parts = new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      }).formatToParts(d);
      const pick = (type) => parts.find(p => p.type === type)?.value || '';
      return `${pick('month')}-${pick('day')} ${pick('hour')}:${pick('minute')}`;
    } catch (e) {
      // 兜底：如果不支持 Intl/timeZone，就直接按本地时间展示
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${m}-${day} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }

  function firstChar(name) {
    if (!name) return '?';
    return String(name).trim().charAt(0).toUpperCase() || '?';
  }

  function escHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function escAttr(value) {
    return escHtml(value)
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  const TYPE_MAP = { comment: 1, like: 2, follow: 3 };
  const TAB_LABEL = { comment: '评论和@', like: '赞和收藏', follow: '新增关注' };
  const PAGE_SIZE = 10;
  const isEmbeddedShell = window.SiteShellEmbed?.isEmbedded === true;
  let viewerId = null;
  let viewerInfo = null;
  let currentTab = 'comment';
  let onlyUnread = false;
  let embedHeightRaf = 0;
  const pageState = {
    comment: { page: 1, total: 0, list: [] },
    like: { page: 1, total: 0, list: [] },
    follow: { page: 1, total: 0, list: [] }
  };

  const navRight = document.getElementById('navRight');


  function reportEmbedHeight() {
    if (!isEmbeddedShell) return;
    const height = Math.max(
      document.documentElement.scrollHeight || 0,
      document.body.scrollHeight || 0,
      document.documentElement.offsetHeight || 0,
      document.body.offsetHeight || 0
    );
    window.parent.postMessage({ type: 'shell:height', view: 'notifications', height }, window.location.origin);
  }

  function scheduleEmbedHeightReport() {
    if (!isEmbeddedShell) return;
    if (embedHeightRaf) cancelAnimationFrame(embedHeightRaf);
    embedHeightRaf = requestAnimationFrame(() => {
      embedHeightRaf = requestAnimationFrame(reportEmbedHeight);
    });
  }

  function navigateTopLevel(url) {
    const shellRoute = /^(\/|\/profile\.html|\/notifications\.html)/.test(url);
    if (isEmbeddedShell && shellRoute && window.parent?.SiteShell?.navigate) {
      window.parent.SiteShell.navigate(url);
      return;
    }
    if (window.SiteNavigation) {
      SiteNavigation.navigate(url);
      return;
    }
    window.location.href = url;
  }

  function buildOwnProfileUrl(userId = viewerId) {
    return userId ? `/profile.html?userId=${encodeURIComponent(userId)}` : '/profile.html';
  }

  function goHome() {
    navigateTopLevel('/');
  }

  function redirectToLogin() {
    if (window.SiteNavigation?.requestLogin) {
      SiteNavigation.requestLogin({
        returnTo: `${window.location.pathname}${window.location.search}${window.location.hash}`
      });
      return;
    }
    goHome();
  }

  function goNotifications() {
    navigateTopLevel('/notifications.html');
  }

  async function hydrateViewer() {
    const res = await request('/user/get/login');
    if (res.code === 0 && res.data) {
      viewerId = res.data.id;
      viewerInfo = res.data;
    } else {
      viewerId = null;
      viewerInfo = null;
    }
    renderViewerEntry();
    warmRoutes();
    scheduleEmbedHeightReport();
  }

  function warmRoutes() {
    if (!window.SiteNavigation) return;
    SiteNavigation.onIdle(() => {
      SiteNavigation.warmRoutes(['/', '/publish.html', '/notifications.html']);
      SiteNavigation.installPrefetchers([
        {
          selector: '[data-prefetch-url]',
          getUrl: element => element.getAttribute('data-prefetch-url') || ''
        },
        {
          selector: '[data-prefetch-profile]',
          getUrl: () => buildOwnProfileUrl()
        }
      ]);
      if (viewerId) {
        SiteNavigation.warmRoutes([buildOwnProfileUrl(viewerId)]);
      }
    });
  }

  function renderViewerEntry() {
    if (!navRight) return;
    if (!viewerInfo) {
      navRight.innerHTML = `<button class="btn-login" type="button" onclick="redirectToLogin()">登录</button>`;
      return;
    }
    const name = viewerInfo.username || `用户${viewerInfo.id || ''}`;
    const avatarHtml = window.SiteAvatar?.renderHtml
      ? SiteAvatar.renderHtml('user-avatar', { avatarUrl: viewerInfo.avatarUrl, username: name, avatarText: name })
      : `<div class="user-avatar">${escHtml((name.charAt(0) || 'U').toUpperCase())}</div>`;
    navRight.innerHTML = `
      <div class="user-badge" onclick="toggleDropdown(event)">
        ${avatarHtml}
        <span>${escHtml(name)}</span>
        <div class="user-dropdown" id="userDropdown">
          <a onclick="openOwnProfilePage(event)">个人主页</a>
          <a onclick="logout(event)" style="color:#ef4444">退出登录</a>
        </div>
      </div>`;
  }

  function toggleDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('userDropdown');
    if (!dropdown) return;
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  }

  document.addEventListener('click', () => {
    const dropdown = document.getElementById('userDropdown');
    if (dropdown) dropdown.style.display = 'none';
  });

  function openPublishPage() {
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    navigateTopLevel('/publish.html');
  }

  function openOwnProfilePage(event) {
    if (event) event.stopPropagation();
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    const nextUrl = buildOwnProfileUrl(viewerId);
    navigateTopLevel(nextUrl);
  }

  async function logout(event) {
    if (event) event.stopPropagation();
    await request('/user/logout', { method: 'POST' });
    navigateTopLevel('/');
  }

  function getActionText(type) {
    if (type === 1) return '评论了你的文章';
    if (type === 2) return '赞了你的文章';
    return '开始关注你了';
  }

  function renderDesc(item) {
    const actionText = getActionText(item.type);
    if (item.type === 3) {
      return actionText;
    }
    const blogTitle = item.blogTitle ? `《${escHtml(item.blogTitle)}》` : '相关博客';
    return `${actionText} <span class="blog-link js-open-blog" data-blog-id="${escAttr(item.blogId)}">${blogTitle}</span>`;
  }

  function renderPager(tab) {
    const state = pageState[tab];
    if (!state || state.total <= PAGE_SIZE) return '';
    const totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
    return `
      <div class="pager">
        <div class="pager-info">第 ${state.page} / ${totalPages} 页，共 ${state.total} 条</div>
        <div class="pager-actions">
          <button class="pager-btn" type="button" data-page-action="prev" ${state.page <= 1 ? 'disabled' : ''}>上一页</button>
          <button class="pager-btn" type="button" data-page-action="next" ${state.page >= totalPages ? 'disabled' : ''}>下一页</button>
        </div>
      </div>
    `;
  }

  function renderList(tab, listOverride = null) {
    const box = document.getElementById('section-' + tab);
    if (!box) return;
    const state = pageState[tab];
    const list = Array.isArray(listOverride) ? listOverride : state.list;
    if (!list.length) {
      const emptyText = onlyUnread ? '当前分类暂无未读通知' : `暂无${TAB_LABEL[tab]}`;
      box.innerHTML = `<div class="empty">${emptyText}</div>`;
      return;
    }
    box.innerHTML = list.map(item => `
      <div class="item ${item.isRead === 0 ? 'unread' : ''}">
        ${window.SiteAvatar?.renderHtml
          ? SiteAvatar.renderHtml('avatar', { fromUserAvatarUrl: item.fromUserAvatarUrl, fromUsername: item.fromUsername, avatarText: firstChar(item.fromUsername || item.fromUserId) })
          : `<div class="avatar">${firstChar(item.fromUsername || item.fromUserId)}</div>`}
        <div class="content">
          <div class="nickname"><span class="u-link js-open-profile" data-user-id="${escAttr(item.fromUserId)}">${escHtml(item.fromUsername || ('用户' + item.fromUserId))}</span></div>
          <div class="desc">${renderDesc(item)}</div>
          <div class="meta">${formatTime(item.createTime)} · ${item.isRead === 0 ? '未读' : '已读'}</div>
        </div>
        ${item.isRead === 0 ? `<button class="item-read-btn js-mark-read" type="button" data-id="${escAttr(item.id)}">标为已读</button>` : ''}
      </div>
    `).join('') + renderPager(tab);
    scheduleEmbedHeightReport();
  }

  async function loadStats() {
    const data = await request('/notification/stats');
    if (data.code !== 0 || !data.data) return;
    updateUnreadDots(data.data);
  }

  function updateUnreadDots(stats) {
    const mapping = {
      comment: Number(stats.commentUnread || 0),
      like: Number(stats.likeUnread || 0),
      follow: Number(stats.followUnread || 0)
    };
    Object.entries(mapping).forEach(([tab, count]) => {
      const el = document.getElementById('dot-' + tab);
      if (!el) return;
      if (count > 0) {
        el.style.display = 'inline-flex';
        el.textContent = count > 99 ? '99+' : String(count);
      } else {
        el.style.display = 'none';
        el.textContent = '';
      }
    });
  }

  async function loadTab(tab, page = 1) {
    currentTab = tab;
    pageState[tab].page = page;
    const box = document.getElementById('section-' + tab);
    if (box) box.innerHTML = '<div class="empty">加载中…</div>';
    const type = TYPE_MAP[tab];
    const data = await request(`/notification/page?type=${type}&page=${page}&size=${PAGE_SIZE}&onlyUnread=${onlyUnread}`);
    if (data.code !== 0 || !data.data) {
      if (box) box.innerHTML = `<div class="empty">${data.message || '加载失败'}</div>`;
      return;
    }
    pageState[tab].page = Number(data.data.page || page);
    pageState[tab].total = Number(data.data.total || 0);
    pageState[tab].list = data.data.list || [];
    renderList(tab);
    scheduleEmbedHeightReport();
  }

  function openProfile(userId) {
    const nextUrl = `/profile.html?userId=${encodeURIComponent(userId)}`;
    navigateTopLevel(nextUrl);
  }

  function openBlog(blogId) {
    if (!blogId && blogId !== 0) return;
    const nextUrl = `/blog.html?blogId=${encodeURIComponent(blogId)}`;
    navigateTopLevel(nextUrl);
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const name = tab.getAttribute('data-tab');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('active');
      loadTab(name, 1);
    });
  });

  document.getElementById('toggleUnreadBtn').addEventListener('click', async () => {
    onlyUnread = !onlyUnread;
    const btn = document.getElementById('toggleUnreadBtn');
    btn.classList.toggle('active', onlyUnread);
    btn.textContent = onlyUnread ? '仅看未读' : '全部通知';
    await loadTab(currentTab, 1);
  });

  document.addEventListener('click', (event) => {
    const profileTrigger = event.target.closest('.js-open-profile');
    if (profileTrigger) {
      event.stopPropagation();
      openProfile(profileTrigger.dataset.userId);
      return;
    }

    const blogTrigger = event.target.closest('.js-open-blog');
    if (blogTrigger) {
      event.stopPropagation();
      openBlog(blogTrigger.dataset.blogId);
      return;
    }

    const readTrigger = event.target.closest('.js-mark-read');
    if (readTrigger) {
      markOneRead(readTrigger.dataset.id);
      return;
    }

    const pagerTrigger = event.target.closest('.pager-btn[data-page-action]');
    if (pagerTrigger) {
      const current = pageState[currentTab]?.page || 1;
      const nextPage = pagerTrigger.dataset.pageAction === 'prev' ? current - 1 : current + 1;
      loadTab(currentTab, nextPage);
    }
  });

  async function doSearch() {
    const kw = (document.getElementById('notifSearch')?.value || '').trim();
    if (window.SiteNavigation?.navigateDiscovery) {
      SiteNavigation.navigateDiscovery(kw);
      return;
    }
    window.location.href = kw ? `/?q=${encodeURIComponent(kw)}` : '/';
  }

  async function markOneRead(notificationId) {
    if (!notificationId) return;
    const res = await request(`/notification/read?notificationId=${encodeURIComponent(notificationId)}`, { method: 'POST' });
    if (res.code === 0 && res.data) {
      await loadStats();
      await loadTab(currentTab, pageState[currentTab]?.page || 1);
    }
  }

  async function markAllRead() {
    const type = TYPE_MAP[currentTab];
    const res = await request(`/notification/read/all?type=${type}`, { method: 'POST' });
    if (res.code === 0) {
      await loadStats();
      await loadTab(currentTab, 1);
    }
  }

  hydrateViewer();
  loadStats();
  loadTab('comment', 1);
  window.addEventListener('resize', scheduleEmbedHeightReport);
  setInterval(loadStats, 20000);
</script>
</body>
</html>
