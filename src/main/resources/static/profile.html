<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页</title>
  <link rel="stylesheet" href="/common-navbar.css">
  <script src="/shell-embed-guard.js" data-shell-view="profile"></script>
  <style>
    @view-transition {
      navigation: auto;
    }
    @keyframes page-fade-in {
      from { opacity: .96; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes page-fade-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: .98; transform: translateY(-6px); }
    }
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: .18s;
      animation-timing-function: ease;
    }
    ::view-transition-old(root) { animation-name: page-fade-out; }
    ::view-transition-new(root) { animation-name: page-fade-in; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1e80ff;
      --primary-hover: #1168d4;
      --text: #222222;
      --muted: #808080;
      --border: #eaeaea;
      --card: #ffffff;
      --bg: #f6f7fb;
      --content-max-width: 760px;
      --profile-summary-width: 560px;
      --profile-card-gap: 18px;
      --tab-panel-gap: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: var(--text);
      min-height: 100vh;
    }
    html.embedded-shell body,
    body.embedded-shell {
      background: transparent;
      overflow-x: hidden;
    }
    html.embedded-shell .navbar,
    html.embedded-shell .sidebar,
    body.embedded-shell .navbar,
    body.embedded-shell .sidebar {
      display: none;
    }
    html.embedded-shell .main-layout,
    body.embedded-shell .main-layout {
      display: block;
      padding-top: 0;
    }
    html.embedded-shell .profile-page,
    body.embedded-shell .profile-page {
      padding: 16px 16px 32px;
    }
    html.embedded-shell .tab-bar,
    body.embedded-shell .tab-bar {
      top: 0;
    }
    html.embedded-shell .profile-card,
    html.embedded-shell .tab-bar,
    html.embedded-shell .panel,
    body.embedded-shell .profile-card,
    body.embedded-shell .tab-bar,
    body.embedded-shell .panel {
      max-width: min(100%, 1560px);
      margin-left: auto;
      margin-right: auto;
    }

    .btn-login {
      padding: 8px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-login:hover { background: var(--primary-hover); }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
      font-size: 14px;
      font-weight: 500;
      color: #111827;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-dropdown {
      display: none;
      position: absolute;
      top: 120%;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      min-width: 140px;
      overflow: hidden;
      z-index: 200;
    }
    .user-dropdown a {
      display: block;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      text-align: center;
    }
    .user-dropdown a:hover { background: #f5f5f5; }
    .notif-dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-layout {
      display: flex;
      padding-top: var(--navbar-height);
      align-items: flex-start;
    }

    .sidebar {
      width: 200px;
      position: sticky;
      top: var(--navbar-height);
      height: calc(100vh - var(--navbar-height));
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all .2s;
    }
    .nav-item:hover {
      background-color: #f3f4f6;
      color: #111827;
    }
    .nav-item.active {
      background-color: #f3f4f6;
      color: #111827;
      font-weight: 600;
    }
    .nav-item span.icon {
      font-size: 20px;
      width: 24px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.5;
    }

    .profile-page {
      flex: 1;
      min-width: 0;
      padding: 24px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
    }

    .profile-card {
      background: transparent;
      border-radius: 0;
      padding: 8px 0 0;
      display: block;
      box-shadow: none;
      border: none;
      position: relative;
      overflow: hidden;
      width: min(100%, 1560px);
      margin: 0 auto var(--profile-card-gap);
    }
    .profile-identity {
      display: flex;
      gap: 28px;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
      width: min(100%, 880px);
      margin: 0 auto;
    }
    .profile-card::before,
    .profile-card::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
    }
    .profile-card::before {
      display: none;
    }
    .profile-card::after {
      display: none;
    }
    .profile-avatar-wrap {
      flex-shrink: 0;
      padding: 8px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(245,248,255,.95));
      border: 1px solid rgba(30,128,255,.10);
      box-shadow: 0 12px 24px rgba(15,23,42,.06);
      position: relative;
      z-index: 1;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: inset 0 -10px 20px rgba(0,0,0,.10);
    }
    .profile-avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .profile-meta {
      flex: 1;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
      text-align: left;
      position: relative;
      z-index: 1;
    }
    .profile-topline {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      align-items: flex-start;
    }
    .profile-title-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      align-items: flex-start;
    }
    .username-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .username {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 0;
      line-height: 1.15;
    }
    .bio-panel {
      align-self: stretch;
      width: min(100%, 680px);
      max-width: 100%;
      border-radius: 14px;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid #e8edf5;
      box-shadow: 0 4px 14px rgba(15,23,42,.04);
    }
    .section-label {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      letter-spacing: .06em;
      margin-bottom: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f3f6fb;
    }
    .bio {
      font-size: 15px;
      color: #374151;
      margin-bottom: 0;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .profile-actions {
      display: inline-flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      width: auto;
    }
    .follow-btn {
      border: 1px solid rgba(30,128,255,0.18);
      background: #1e80ff;
      color: #fff;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
      box-shadow: 0 8px 18px rgba(30,128,255,.16);
    }
    .follow-btn:hover:not(:disabled),
    .profile-edit-btn:hover {
      transform: translateY(-1px);
    }
    .follow-btn.secondary {
      background: #fff;
      color: #1e80ff;
      box-shadow: none;
    }
    .follow-btn:disabled {
      opacity: .7;
      cursor: not-allowed;
    }
    .profile-edit-btn {
      border: 1px solid rgba(15,23,42,0.12);
      background: #fff;
      color: #111827;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
    }
    .profile-edit-btn:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .profile-stats-compact {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 2px;
    }
    .compact-stat {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      border: none;
      background: none;
      padding: 0;
      color: #111827;
      cursor: default;
      text-align: left;
    }
    .compact-stat.clickable { cursor: pointer; }
    .compact-stat.clickable:hover .compact-stat-value,
    .compact-stat.clickable:hover .compact-stat-label {
      color: var(--primary);
    }
    .compact-stat-value {
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      color: #111827;
    }
    .compact-stat-label {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.2;
    }
    .tab-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      border-bottom: none;
      padding: 0 0 4px;
      width: min(100%, 1560px);
      margin: 0 auto var(--tab-panel-gap);
      position: sticky;
      top: var(--navbar-height);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      z-index: 5;
    }
    .tab {
      border: none;
      background: none;
      padding: 10px 18px;
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
      border-radius: 999px;
    }
    .tab.active {
      background: #ffffff;
      box-shadow: none;
      border: 1px solid #e5e7eb;
      color: #111827;
      font-weight: 600;
      position: relative;
    }
    .tab-count {
      margin-left: 6px;
      font-size: 13px;
      font-weight: 600;
      color: inherit;
    }
    /* Removed underline pseudo-element per design request */

    .blog-result-count {
      display: none;
    }

    .panel {
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      border: none;
      width: min(100%, 1560px);
      margin: 0 auto;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 20px;
      width: 100%;
      --masonry-row: 8px;
      grid-auto-flow: dense;
      align-items: start;
    }
    .blog-grid.masonry-ready {
      grid-auto-rows: var(--masonry-row);
    }
    .blog-tools {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .blog-tool-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .blog-filter-btn {
      border: 1px solid rgba(15,23,42,0.12);
      background: #fff;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #374151;
      transition: background .15s, color .15s, border-color .15s;
    }
    .blog-filter-btn.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }
    .blog-search-input {
      min-width: 240px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      outline: none;
      background: #fff;
      color: #111827;
    }
    .blog-search-input:focus { border-color: #d1d5db; }
    .blog-result-count {
      font-size: 13px;
      color: #6b7280;
    }
    .record-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(30,128,255,.08);
      color: #1e60c9;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .xhs-card {
      background: var(--card);
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      border: 1px solid #f0f0f0;
      width: 100%;
    }
    .xhs-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.04);
    }
    .blog-card {
      box-shadow: none;
    }
    .blog-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.04); }
    .card-media {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2f7 100%);
    }
    .blog-cover-shell {
      position: relative;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2f7 100%);
      overflow: hidden;
      border-radius: 16px;
    }
    .card-cover {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 16px;
      background: #f0f0f0;
      display: block;
      aspect-ratio: 3 / 4;
      transition: opacity .18s ease;
    }
    .blog-cover {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 16px;
      background: #f0f0f0;
      transition: opacity .18s ease;
    }
    .blog-cover-shell.media-landscape .blog-cover {
      object-fit: contain;
      padding: 10px;
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
    }
    .blog-cover-fallback {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .blog-cover-shell.is-fallback .blog-cover,
    .blog-cover-shell.no-cover .blog-cover {
      opacity: 0;
    }
    .blog-cover-shell.is-fallback .blog-cover-fallback,
    .blog-cover-shell.no-cover .blog-cover-fallback {
      opacity: 1;
    }
    .media-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #dbe6f5 0%, #c4d4ea 100%);
    }
    .blog-cover-fallback.media-fallback { padding: 18px; }
    .media-fallback-art {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
      border-radius: 14px;
      padding: 16px;
      background:
        radial-gradient(circle at 24% 24%, rgba(255,255,255,.96) 0 18%, rgba(255,255,255,0) 19%),
        radial-gradient(circle at 78% 18%, rgba(255,255,255,.7) 0 12%, rgba(255,255,255,0) 13%),
        linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,.62) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
    }
    .media-fallback-line {
      display: block;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 12px 28px rgba(71,85,105,.18);
    }
    .media-fallback-line-lg { width: 72%; }
    .media-fallback-line-md { width: 52%; }
    .media-fallback-line-sm { width: 36%; }
    .media-fallback-frame {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(180deg, rgba(255,255,255,.2) 0%, rgba(255,255,255,.08) 100%);
      border: 1px solid rgba(255,255,255,.34);
      box-shadow: inset 0 0 0 1px rgba(148,163,184,.12);
    }
    .media-fallback-tip {
      margin-top: 14px;
      align-self: flex-start;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(15,23,42,.72);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .card-media-fallback {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .card-media.is-fallback .card-cover,
    .card-media.no-cover .card-cover {
      opacity: 0;
    }
    .card-media.is-fallback .card-media-fallback,
    .card-media.no-cover .card-media-fallback {
      opacity: 1;
    }
    .blog-cover-shell.text-card {
      background: #ffffff;
      border: 1px solid #eceff3;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      aspect-ratio: 3 / 4;
    }
    .card-text-shell {
      aspect-ratio: 3 / 4;
      padding: 34px 30px 42px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      position: relative;
      background: #ffffff;
      border: 1px solid #eef2f7;
      border-radius: 28px;
    }
    .card-text-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0;
      min-height: 100%;
      text-align: center;
    }
    .card-text-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.34;
      color: #2f2f2b;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: .01em;
      text-align: center;
    }
    .card-text-quote {
      display: none;
    }
    .profile-card-content {
      padding: 12px 8px 4px;
    }
    .profile-card-content:empty {
      display: none;
    }
    .profile-card-content .record-badge {
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #111827;
      line-height: 1.5;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 12px 8px;
      gap: 12px;
    }
    .xhs-card.text-card .card-footer {
      padding-top: 8px;
    }
    .card-author {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #4b5563;
      min-width: 0;
      flex: 1;
    }
    .card-author .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .card-author-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .card-author-name,
    .card-author-meta {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-author-name {
      color: #4b5563;
      font-size: 14px;
      line-height: 1;
      font-weight: 600;
    }
    .card-author-meta {
      color: #9ca3af;
      font-size: 12px;
    }
    .card-like {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #9ca3af;
      flex-shrink: 0;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      box-shadow: none;
      transition: color .18s ease;
    }
    .card-like:hover { color: #6b7280; }
    .card-like.liked { color: #ef4444; }
    .card-like .heart {
      width: 20px;
      height: 20px;
      color: currentColor;
      pointer-events: none;
      flex-shrink: 0;
    }
    .cover-like-count {
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      color: currentColor;
      pointer-events: none;
    }
    .manage-btns {
      display: flex;
      gap: 8px;
      padding: 0 8px 12px;
    }
    .btn-edit, .btn-del {
      flex: 1;
      padding: 6px 0;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;

    <div id="likesScrollSentinel" style="height:1px;"></div>
  </section>
</main>
</div>
<div id="toast" class="toast"></div>
<div id="editProfileModal" class="modal-mask" onclick="handleModalMaskClick(event)">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-copy">
        <div class="modal-kicker">资料设置</div>
        <div class="modal-title">编辑个人资料</div>
        <div class="modal-subtitle">只展示年龄和个人简历，保存后会立即同步到当前个人主页。</div>
      </div>
      <button class="modal-close" type="button" aria-label="关闭" onclick="closeEditProfileModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label" for="editAvatarFileInput">头像</label>
      <div class="avatar-upload-row">
        <div class="avatar-upload-preview" id="editAvatarPreview">U</div>
        <div class="avatar-upload-copy">
          <div class="form-hint" id="editAvatarHint">支持 JPG、PNG、WEBP、GIF，建议上传清晰的 1:1 图片。</div>
          <div class="avatar-upload-actions">
            <input id="editAvatarFileInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" hidden onchange="handleAvatarFileChange(event)">
            <button class="avatar-upload-btn primary" id="uploadAvatarBtn" type="button" onclick="triggerAvatarFileSelect()">上传头像</button>
            <button class="avatar-upload-btn" id="clearAvatarBtn" type="button" onclick="clearAvatarSelection()">恢复默认</button>
          </div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="editAgeInput">年龄</label>
      <input id="editAgeInput" class="form-input" type="number" min="1" max="150" placeholder="请输入年龄">
      <div class="form-hint">请输入 1 - 150 之间的整数。</div>
    </div>
    <div class="form-group">
      <label class="form-label" for="editBioInput">个人简历</label>
      <textarea id="editBioInput" class="form-textarea" maxlength="200" placeholder="介绍一下你自己吧～"></textarea>
      <div class="form-hint-row">
        <div class="form-hint">支持换行，最多 200 个字符。</div>
        <div class="form-hint count" id="bioCounter"><span id="bioCount">0</span>/200</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" type="button" onclick="closeEditProfileModal()">取消</button>
      <button class="modal-btn primary" id="saveProfileBtn" type="button" onclick="submitProfileEdit()">保存</button>
    </div>
  </div>
</div>
<script src="/site-navigation.js"></script>
<script src="/avatar-render.js"></script>
<script src="/oss-upload.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('userId')?.trim();
  const isEmbeddedShell = window.SiteShellEmbed?.isEmbedded === true;
  const navRight = document.getElementById('navRight');
  const toastEl = document.getElementById('toast');
  const blogPlaceholder = document.getElementById('blogPlaceholder');
  const blogGrid = document.getElementById('blogGrid');
  const blogTools = document.getElementById('blogTools');
  const blogResultCount = document.getElementById('blogResultCount');
  const tabBlogCount = document.getElementById('tabBlogCount');
  const blogLoadState = document.getElementById('blogLoadState');
  const blogScrollSentinel = document.getElementById('blogScrollSentinel');
  const favoritesTools = document.getElementById('favoritesTools');
  const favoritesPlaceholder = document.getElementById('favoritesPlaceholder');
  const favoritesGrid = document.getElementById('favoritesGrid');
  const favoritesResultCount = document.getElementById('favoritesResultCount');
  const tabFavoritesCount = document.getElementById('tabFavoritesCount');
  const favoritesLoadState = document.getElementById('favoritesLoadState');
  const favoritesScrollSentinel = document.getElementById('favoritesScrollSentinel');
  const likesTools = document.getElementById('likesTools');
  const likesPlaceholder = document.getElementById('likesPlaceholder');
  const likesGrid = document.getElementById('likesGrid');
  const likesResultCount = document.getElementById('likesResultCount');
  const tabLikesCount = document.getElementById('tabLikesCount');
  const likesLoadState = document.getElementById('likesLoadState');
  const likesScrollSentinel = document.getElementById('likesScrollSentinel');
  const editProfileModal = document.getElementById('editProfileModal');
  const avatarBadge = document.getElementById('avatarBadge');
  const editAvatarPreview = document.getElementById('editAvatarPreview');
  const editAvatarHint = document.getElementById('editAvatarHint');
  const editAvatarFileInput = document.getElementById('editAvatarFileInput');
  const uploadAvatarBtn = document.getElementById('uploadAvatarBtn');
  const clearAvatarBtn = document.getElementById('clearAvatarBtn');
  const editAgeInput = document.getElementById('editAgeInput');
  const editBioInput = document.getElementById('editBioInput');
  const bioCount = document.getElementById('bioCount');
  const bioCounter = document.getElementById('bioCounter');
  const saveProfileBtn = document.getElementById('saveProfileBtn');
  const AUTO_ADAPT_LANDSCAPE_RATIO = 1.08;
  const BLOG_PAGE_SIZE = 15;
  let blogsLoading = false;
  let blogsLoaded = false;
  let viewerRole = 0;
  let viewerId = null;
  let viewerInfo = null;
  let currentProfile = null;
  let followSubmitting = false;
  let profileSaving = false;
  let avatarUploading = false;
  let profileCanManage = false;
  let profileCanEdit = false;
  let pendingAvatarUrl = '';
  let allBlogs = [];
  let blogSort = 'latest';
  let blogKeyword = '';
  let blogCursor = '';
  let blogTotal = 0;
  let blogHasMore = true;
  let blogMasonryRaf = 0;
  let blogQueryToken = 0;
  let blogObserver = null;
  let pendingBlogReset = false;
  let blogKeywordDebounceTimer = 0;
  let favoritesLoading = false;
  let favoritesLoaded = false;
  let favoriteBlogs = [];
  let favoritesCursor = '';
  let favoritesTotal = 0;
  let favoritesHasMore = true;
  let favoritesMasonryRaf = 0;
  let favoritesQueryToken = 0;
  let favoritesObserver = null;
  let pendingFavoritesReset = false;
  let likesLoading = false;
  let likesLoaded = false;
  let likedBlogs = [];
  let likesCursor = '';
  let likesTotal = 0;
  let likesHasMore = true;
  const profileThumbPending = new Set();
  let likesMasonryRaf = 0;
  let likesQueryToken = 0;
  let likesObserver = null;
  let pendingLikesReset = false;
  let embedHeightRaf = 0;
  let modalViewportSyncAttached = false;
  let parentScrollLockState = null;


  function reportEmbedHeight() {
    if (!isEmbeddedShell) return;
    const height = Math.max(
      document.documentElement.scrollHeight || 0,
      document.body.scrollHeight || 0,
      document.documentElement.offsetHeight || 0,
      document.body.offsetHeight || 0
    );
    window.parent.postMessage({ type: 'shell:height', view: 'profile', height }, window.location.origin);
  }

  function scheduleEmbedHeightReport() {
    if (!isEmbeddedShell) return;
    if (embedHeightRaf) cancelAnimationFrame(embedHeightRaf);
    embedHeightRaf = requestAnimationFrame(() => {
      embedHeightRaf = requestAnimationFrame(reportEmbedHeight);
    });
  }

  function navigateTopLevel(url) {
    if (isEmbeddedShell && window.parent?.SiteShell?.navigate) {
      window.parent.SiteShell.navigate(url);
      return;
    }
    if (window.SiteNavigation) {
      SiteNavigation.navigate(url);
      return;
    }
    window.location.href = url;
  }

  function buildOwnProfileUrl(userId = viewerId) {
    return userId ? `/profile.html?userId=${encodeURIComponent(userId)}` : '/profile.html';
  }

  function goHome() {
    navigateTopLevel('/');
  }

  function redirectToLogin() {
    if (window.SiteNavigation?.requestLogin) {
      SiteNavigation.requestLogin({
        returnTo: `${window.location.pathname}${window.location.search}${window.location.hash}`
      });
      return;
    }
    goHome();
  }

  editBioInput.addEventListener('input', syncBioCount);
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape' && editProfileModal.classList.contains('show')) {
      closeEditProfileModal();
    }
  });
  window.addEventListener('resize', requestBlogMasonryLayout);
  window.addEventListener('resize', requestFavoritesMasonryLayout);
  window.addEventListener('resize', requestLikesMasonryLayout);
  window.addEventListener('resize', scheduleEmbedHeightReport);
  window.addEventListener('pagehide', () => {
    toggleParentScrollLock(false);
    detachEditProfileModalViewportSync();
  });

  setupBlogInfiniteScroll();
  setupFavoritesInfiniteScroll();
  setupLikesInfiniteScroll();
  bootstrap();

  async function bootstrap() {
    await hydrateViewer();
    initProfile();
    scheduleEmbedHeightReport();
  }

  async function hydrateViewer() {
    const res = await request('/user/get/login');
    if (res.code === 0 && res.data) {
      viewerRole = Number(res.data.role || 0);
      viewerId = res.data.id;
      viewerInfo = res.data;
    } else {
      viewerRole = 0;
      viewerId = null;
      viewerInfo = null;
    }
    renderViewerEntry();
    loadUnreadCount();
    warmRoutes();
    scheduleEmbedHeightReport();
  }

  function warmRoutes() {
    if (!window.SiteNavigation) return;
    SiteNavigation.onIdle(() => {
      SiteNavigation.warmRoutes(['/', '/publish.html', '/notifications.html']);
      SiteNavigation.installPrefetchers([
        {
          selector: '[data-prefetch-url]',
          getUrl: element => element.getAttribute('data-prefetch-url') || ''
        },
        {
          selector: '[data-prefetch-profile]',
          getUrl: () => buildOwnProfileUrl()
        }
      ]);
      if (viewerId) {
        SiteNavigation.warmRoutes([buildOwnProfileUrl(viewerId)]);
      }
    });
  }

  function renderViewerEntry() {
    if (!navRight) return;
    if (!viewerInfo) {
      navRight.innerHTML = `<button class="btn-login" type="button" onclick="goHome()">登录</button>`;
      return;
    }
    const name = viewerInfo.username || `用户${viewerInfo.id || ''}`;
    const avatarHtml = window.SiteAvatar?.renderHtml
      ? SiteAvatar.renderHtml('user-avatar', { avatarUrl: viewerInfo.avatarUrl, username: name, avatarText: name })
      : `<div class="user-avatar">${escapeHtml((name.charAt(0) || 'U').toUpperCase())}</div>`;
    navRight.innerHTML = `
      <div class="user-badge" onclick="toggleDropdown(event)">
        ${avatarHtml}
        <span>${escapeHtml(name)}</span>
        <div class="notif-dot" id="notifDot" style="display:none;"></div>
        <div class="user-dropdown" id="userDropdown">
          <a onclick="openOwnProfilePage(event)">个人主页</a>
          <a onclick="logout(event)" style="color:#ef4444">退出登录</a>
        </div>
      </div>`;
  }

  function toggleDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('userDropdown');
    if (!dropdown) return;
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  }

  document.addEventListener('click', () => {
    const dropdown = document.getElementById('userDropdown');
    if (dropdown) dropdown.style.display = 'none';
  });

  async function logout(event) {
    if (event) event.stopPropagation();
    await request('/user/logout', { method: 'POST' });
    window.location.reload();
  }

  async function loadUnreadCount() {
    if (!viewerInfo) return;
    const res = await request('/notification/unread/count');
    const dot = document.getElementById('notifDot');
    if (!dot) return;
    if (res.code === 0 && Number(res.data || 0) > 0) {
      dot.style.display = 'flex';
      dot.textContent = Number(res.data) > 99 ? '99+' : String(res.data);
      return;
    }
    dot.style.display = 'none';
    dot.textContent = '';
  }

  function openPublishPage() {
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    navigateTopLevel('/publish.html');
  }

  function openNotificationsPage() {
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    navigateTopLevel('/notifications.html');
  }

  function openOwnProfilePage(event) {
    if (event) event.stopPropagation();
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    const ownProfileUrl = buildOwnProfileUrl(viewerId);
    if (String(pid || '') === String(viewerId || '')) return;
    navigateTopLevel(ownProfileUrl);
  }

  async function initProfile() {
    const url = pid ? `/user/profile?userId=${encodeURIComponent(pid)}` : '/user/profile';
    const res = await request(url);
    if (isUnauthorized(res)) {
      renderProfileLoginRequired();
      renderBlogLoginRequired();
      redirectToLogin();
      return;
    }
    if (res.code !== 0 || !res.data) {
      showToast(res.message || '加载个人信息失败');
      document.getElementById('profileCard').innerHTML = '<div style="text-align:center; width:100%;">暂时无法获取该用户信息。</div>';
      return;
    }
    renderProfile(res.data);
  }

  function renderProfile(data) {
    currentProfile = { ...data };
    profileCanManage = !!(data?.self || viewerRole === 1);
    profileCanEdit = !!data?.self;
    document.getElementById('username').textContent = data.username || '未命名用户';
    document.getElementById('bio').textContent = data.bio || '还没有填写个人简历';
    renderProfileAvatar(data);

    renderFollowAction(data);

    document.getElementById('statFollow').textContent = formatNumber(data.followCount);
    document.getElementById('statFans').textContent = formatNumber(data.fansCount);
    document.getElementById('statLikeCollect').textContent = formatNumber(data.likedAndCollectedCount);
    updateTabCounts();

    if (!blogsLoaded && !blogsLoading && !allBlogs.length) {
      resetAndLoadUserBlogs();
      return;
    }
    renderBlogList();
    scheduleEmbedHeightReport();
  }

  function renderFollowAction(data) {
    const actions = document.getElementById('profileActions');
    if (!actions) return;
    if (!data) {
      actions.innerHTML = '';
      return;
    }
    if (data.self) {
      actions.innerHTML = '<button class="profile-edit-btn" type="button" onclick="openEditProfileModal()">编辑资料</button>';
      return;
    }
    const buttonText = !viewerId
      ? '登录后关注'
      : (data.following ? '已关注' : '关注');
    actions.innerHTML = `<button class="follow-btn${data.following ? ' secondary' : ''}" id="followBtn" type="button" onclick="toggleFollow()">${buttonText}</button>`;
  }

  async function toggleFollow() {
    if (!currentProfile || !currentProfile.userId || currentProfile.self || followSubmitting) return;
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    const followBtn = document.getElementById('followBtn');
    const nextFollowing = !currentProfile.following;
    const url = nextFollowing
      ? `/follow/do?userId=${encodeURIComponent(currentProfile.userId)}`
      : `/follow/undo?userId=${encodeURIComponent(currentProfile.userId)}`;
    followSubmitting = true;
    if (followBtn) {
      followBtn.disabled = true;
      followBtn.textContent = nextFollowing ? '关注中…' : '取消中…';
    }
    const res = await request(url, { method: 'POST' });
    followSubmitting = false;
    if (isUnauthorized(res)) {
      redirectToLogin();
      renderFollowAction(currentProfile);
      return;
    }
    if (res.code !== 0 || !res.data) {
      showToast(res.message || '操作失败，请稍后重试');
      renderFollowAction(currentProfile);
      return;
    }
    currentProfile.following = !!res.data.following;
    const fallbackFansCount = Math.max(0, Number(currentProfile.fansCount || 0) + (currentProfile.following ? 1 : -1));
    currentProfile.fansCount = Number(res.data.fansCount ?? fallbackFansCount);
    document.getElementById('statFans').textContent = formatNumber(currentProfile.fansCount);
    renderFollowAction(currentProfile);
  }

  function openFollowList(type) {
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    const targetUserId = currentProfile?.userId || pid || viewerId;
    const query = new URLSearchParams();
    if (targetUserId) query.set('userId', targetUserId);
    query.set('type', type === 'fans' ? 'fans' : 'following');
    navigateTopLevel(`/follow-list.html?${query.toString()}`);
  }

  function openEditProfileModal() {
    if (!profileCanEdit || !currentProfile) return;
    pendingAvatarUrl = normalizeImageUrl(currentProfile.avatarUrl);
    editAgeInput.value = currentProfile.age ?? '';
    editBioInput.value = currentProfile.bio || '';
    syncAvatarUploadPreview();
    resetAvatarUploadState();
    syncBioCount();
    saveProfileBtn.disabled = false;
    saveProfileBtn.textContent = '保存';
    toggleEditProfileModal(true);
    setTimeout(() => editAgeInput.focus(), 0);
  }

  function closeEditProfileModal() {
    if (profileSaving) return;
    toggleEditProfileModal(false);
  }

  function handleModalMaskClick(event) {
    if (event.target === editProfileModal) {
      closeEditProfileModal();
    }
  }

  async function submitProfileEdit() {
    if (!profileCanEdit || !currentProfile || profileSaving || avatarUploading) return;
    const ageValue = Number(editAgeInput.value);
    const bioValue = String(editBioInput.value || '').trim();
    if (!Number.isInteger(ageValue) || ageValue < 1 || ageValue > 150) {
      showToast('年龄需在 1-150 之间');
      editAgeInput.focus();
      return;
    }
    if (bioValue.length > 200) {
      showToast('个人简历不能超过 200 个字符');
      editBioInput.focus();
      return;
    }
    profileSaving = true;
    saveProfileBtn.disabled = true;
    saveProfileBtn.textContent = '保存中…';
    const res = await request('/user/me/profile', {
      method: 'POST',
      body: JSON.stringify({ age: ageValue, bio: bioValue, avatarUrl: pendingAvatarUrl || null })
    });
    profileSaving = false;
    saveProfileBtn.disabled = false;
    saveProfileBtn.textContent = '保存';
    if (isUnauthorized(res)) {
      showToast(res.message || '请先登录');
      return;
    }
    if (res.code !== 0 || !res.data) {
      showToast(res.message || '保存失败，请稍后重试');
      return;
    }
    closeEditProfileModal();
    renderProfile(res.data);
    showToast('个人资料已更新');
  }

  function triggerAvatarFileSelect() {
    if (avatarUploading) return;
    editAvatarFileInput.click();
  }

  async function handleAvatarFileChange(event) {
    const file = event?.target?.files?.[0];
    if (!file) return;
    if (!window.SiteOssUpload?.uploadImage) {
      showToast('上传能力未就绪，请刷新后重试');
      editAvatarFileInput.value = '';
      return;
    }
    avatarUploading = true;
    saveProfileBtn.disabled = true;
    uploadAvatarBtn.disabled = true;
    clearAvatarBtn.disabled = true;
    editAvatarHint.textContent = '头像上传中…';
    try {
      const result = await SiteOssUpload.uploadImage(file, 'avatar');
      pendingAvatarUrl = normalizeImageUrl(result.publicUrl);
      syncAvatarUploadPreview();
      editAvatarHint.textContent = '头像已上传成功，保存后生效。';
      showToast('头像上传成功');
    } catch (error) {
      editAvatarHint.textContent = error?.message || '头像上传失败，请稍后重试';
      showToast(editAvatarHint.textContent);
    } finally {
      avatarUploading = false;
      editAvatarFileInput.value = '';
      resetAvatarUploadState();
    }
  }

  function clearAvatarSelection() {
    pendingAvatarUrl = '';
    syncAvatarUploadPreview();
    editAvatarHint.textContent = '已恢复默认头像，保存后生效。';
  }

  function syncEditProfileModalViewportPosition() {
    if (!isEmbeddedShell || !editProfileModal?.classList.contains('show')) return;
    try {
      const frame = window.frameElement;
      const parentWindow = window.parent;
      const parentDoc = parentWindow?.document;
      if (!frame || !parentWindow || !parentDoc) return;
      const frameRect = frame.getBoundingClientRect();
      const parentViewportHeight = parentWindow.innerHeight || parentDoc.documentElement.clientHeight || window.innerHeight;
      const visibleTop = Math.max(0, -frameRect.top);
      const visibleBottom = Math.min(frameRect.height, parentViewportHeight - frameRect.top);
      const visibleHeight = Math.max(0, visibleBottom - visibleTop) || Math.min(frameRect.height, parentViewportHeight);
      const centerY = Math.max(visibleTop + (visibleHeight / 2), 24);
      const overlayHeight = Math.max(
        document.documentElement.scrollHeight || 0,
        document.body.scrollHeight || 0,
        frameRect.height || 0
      );
      const maxHeight = Math.max(320, Math.min(visibleHeight - 32, parentViewportHeight - 32));
      editProfileModal.style.setProperty('--embed-modal-center-y', `${Math.round(centerY)}px`);
      editProfileModal.style.setProperty('--embed-modal-overlay-height', `${Math.round(overlayHeight)}px`);
      editProfileModal.style.setProperty('--embed-modal-max-height', `${Math.round(maxHeight)}px`);
    } catch (error) {
      // ignore cross-window measurement failures
    }
  }

  function attachEditProfileModalViewportSync() {
    if (!isEmbeddedShell || modalViewportSyncAttached) return;
    try {
      window.parent?.addEventListener('scroll', syncEditProfileModalViewportPosition, { passive: true });
      window.parent?.addEventListener('resize', syncEditProfileModalViewportPosition);
      window.addEventListener('resize', syncEditProfileModalViewportPosition);
      modalViewportSyncAttached = true;
    } catch (error) {
      // ignore cross-window listener failures
    }
  }

  function detachEditProfileModalViewportSync() {
    if (!modalViewportSyncAttached) return;
    try {
      window.parent?.removeEventListener('scroll', syncEditProfileModalViewportPosition);
      window.parent?.removeEventListener('resize', syncEditProfileModalViewportPosition);
    } catch (error) {
      // ignore cross-window listener failures
    }
    window.removeEventListener('resize', syncEditProfileModalViewportPosition);
    modalViewportSyncAttached = false;
  }

  function toggleParentScrollLock(lock) {
    if (!isEmbeddedShell) return;
    try {
      const parentDoc = window.parent?.document;
      if (!parentDoc?.body || !parentDoc?.documentElement) return;
      if (lock) {
        if (!parentScrollLockState) {
          parentScrollLockState = {
            bodyOverflow: parentDoc.body.style.overflow,
            htmlOverflow: parentDoc.documentElement.style.overflow
          };
        }
        parentDoc.body.style.overflow = 'hidden';
        parentDoc.documentElement.style.overflow = 'hidden';
        return;
      }
      if (!parentScrollLockState) return;
      parentDoc.body.style.overflow = parentScrollLockState.bodyOverflow;
      parentDoc.documentElement.style.overflow = parentScrollLockState.htmlOverflow;
      parentScrollLockState = null;
    } catch (error) {
      // ignore cross-window style failures
    }
  }

  function resetAvatarUploadState() {
    saveProfileBtn.disabled = false;
    uploadAvatarBtn.disabled = false;
    clearAvatarBtn.disabled = false;
  }

  function syncAvatarUploadPreview() {
    renderAvatarSurface(editAvatarPreview, {
      avatarUrl: pendingAvatarUrl,
      avatarText: currentProfile?.avatarText,
      username: currentProfile?.username
    });
  }

  function toggleEditProfileModal(show) {
    editProfileModal.classList.toggle('show', !!show);
    document.body.style.overflow = show ? 'hidden' : '';
    if (show) {
      attachEditProfileModalViewportSync();
      toggleParentScrollLock(true);
      syncEditProfileModalViewportPosition();
      requestAnimationFrame(syncEditProfileModalViewportPosition);
      return;
    }
    toggleParentScrollLock(false);
    detachEditProfileModalViewportSync();
    editProfileModal.style.removeProperty('--embed-modal-center-y');
    editProfileModal.style.removeProperty('--embed-modal-overlay-height');
    editProfileModal.style.removeProperty('--embed-modal-max-height');
  }

  function syncBioCount() {
    const length = String(editBioInput.value || '').length;
    bioCount.textContent = String(length);
    bioCounter.classList.toggle('warn', length >= 180);
  }

  function renderProfileAvatar(data) {
    renderAvatarSurface(avatarBadge, data);
  }

  function renderAvatarSurface(element, data = {}) {
    if (!element) return;
    if (window.SiteAvatar?.apply) {
      SiteAvatar.apply(element, data);
      return;
    }
    const avatarUrl = normalizeImageUrl(data.avatarUrl);
    if (avatarUrl) {
      element.innerHTML = `<img class="profile-avatar-img" src="${escapeAttr(avatarUrl)}" alt="${escapeAttr((data.username || '用户') + '头像')}">`;
      element.style.background = '#eef5ff';
      return;
    }
    element.textContent = (data.avatarText || (data.username || 'U').charAt(0) || 'U').toUpperCase();
    element.style.background = '#1e80ff';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
    document.querySelectorAll('.panel').forEach(panel => {
      panel.style.display = panel.id === `panel-${tab}` ? 'block' : 'none';
    });
    if (tab === 'blogs') {
      if (!blogsLoaded && !blogsLoading && !allBlogs.length) {
        resetAndLoadUserBlogs();
      } else {
        renderBlogList();
        requestBlogMasonryLayout();
      }
      return;
    }
    if (tab === 'favorites') {
      if (!favoritesLoaded && !favoritesLoading && !favoriteBlogs.length) {
        resetAndLoadFavoriteBlogs();
      } else {
        renderFavoriteBlogList();
        requestFavoritesMasonryLayout();
      }
      return;
    }
    if (tab === 'likes') {
      if (!likesLoaded && !likesLoading && !likedBlogs.length) {
        resetAndLoadLikedBlogs();
      } else {
        renderLikedBlogList();
        requestLikesMasonryLayout();
      }
    }
  }

  function setupBlogInfiniteScroll() {
    if (!blogScrollSentinel || typeof IntersectionObserver === 'undefined') return;
    blogObserver = new IntersectionObserver(entries => {
      if (!entries[0]?.isIntersecting) return;
      if (!isBlogsTabActive() || blogsLoading || !blogsLoaded || !blogHasMore) return;
      loadUserBlogs(false, blogQueryToken);
    }, { threshold: 0.1 });
    blogObserver.observe(blogScrollSentinel);
  }

  function isBlogsTabActive() {
    const panel = document.getElementById('panel-blogs');
    return !!panel && panel.style.display !== 'none';
  }

  function setupLikesInfiniteScroll() {
    if (!likesScrollSentinel || typeof IntersectionObserver === 'undefined') return;
    likesObserver = new IntersectionObserver(entries => {
      if (!entries[0]?.isIntersecting) return;
      if (!isLikesTabActive() || likesLoading || !likesLoaded || !likesHasMore) return;
      loadLikedBlogs(false, likesQueryToken);
    }, { threshold: 0.1 });
    likesObserver.observe(likesScrollSentinel);
  }

  function setupFavoritesInfiniteScroll() {
    if (!favoritesScrollSentinel || typeof IntersectionObserver === 'undefined') return;
    favoritesObserver = new IntersectionObserver(entries => {
      if (!entries[0]?.isIntersecting) return;
      if (!isFavoritesTabActive() || favoritesLoading || !favoritesLoaded || !favoritesHasMore) return;
      loadFavoriteBlogs(false, favoritesQueryToken);
    }, { threshold: 0.1 });
    favoritesObserver.observe(favoritesScrollSentinel);
  }

  function isFavoritesTabActive() {
    const panel = document.getElementById('panel-favorites');
    return !!panel && panel.style.display !== 'none';
  }

  function isLikesTabActive() {
    const panel = document.getElementById('panel-likes');
    return !!panel && panel.style.display !== 'none';
  }

  function resetAndLoadUserBlogs() {
    if (!isBlogsTabActive()) {
      blogsLoaded = false;
      blogCursor = '';
      blogTotal = 0;
      blogHasMore = true;
      allBlogs = [];
      return;
    }
    if (blogsLoading) {
      pendingBlogReset = true;
      blogQueryToken += 1;
      return;
    }
    pendingBlogReset = false;
    blogQueryToken += 1;
    loadUserBlogs(true, blogQueryToken);
  }

  function buildUserBlogUrl() {
    const query = new URLSearchParams();
    if (pid) query.set('userId', pid);
    query.set('size', String(BLOG_PAGE_SIZE));
    if (blogCursor) query.set('cursor', blogCursor);
    if (blogSort && blogSort !== 'latest') query.set('sort', blogSort);
    if (blogKeyword) query.set('keyword', blogKeyword);
    return `/blog/user?${query.toString()}`;
  }

  function setBlogLoadState(text = '') {
    blogLoadState.textContent = text;
    blogLoadState.style.display = text ? 'block' : 'none';
  }

  function setLikesLoadState(text = '') {
    likesLoadState.textContent = text;
    likesLoadState.style.display = text ? 'block' : 'none';
  }

  function setFavoritesLoadState(text = '') {
    favoritesLoadState.textContent = text;
    favoritesLoadState.style.display = text ? 'block' : 'none';
  }

  function resetBlogLoadingView() {
    blogsLoaded = false;
    blogCursor = '';
    blogTotal = 0;
    blogHasMore = true;
    allBlogs = [];
    blogGrid.innerHTML = '';
    blogGrid.style.display = 'none';
    blogTools.style.display = 'none';
    blogPlaceholder.style.display = 'block';
    blogPlaceholder.textContent = '博客内容加载中，请稍候…';
    blogResultCount.textContent = '';
    updateTabCounts();
    setBlogLoadState('');
  }

  function resetLikesLoadingView() {
    likesLoaded = false;
    likesCursor = '';
    likesTotal = 0;
    likesHasMore = true;
    likedBlogs = [];
    likesGrid.innerHTML = '';
    likesGrid.style.display = 'none';
    likesTools.style.display = 'none';
    likesPlaceholder.style.display = 'block';
    likesPlaceholder.textContent = '点赞记录加载中，请稍候…';
    likesResultCount.textContent = '';
    updateTabCounts();
    setLikesLoadState('');
  }

  function resetFavoritesLoadingView() {
    favoritesLoaded = false;
    favoritesCursor = '';
    favoritesTotal = 0;
    favoritesHasMore = true;
    favoriteBlogs = [];
    favoritesGrid.innerHTML = '';
    favoritesGrid.style.display = 'none';
    favoritesTools.style.display = 'none';
    favoritesPlaceholder.style.display = 'block';
    favoritesPlaceholder.textContent = '收藏记录加载中，请稍候…';
    favoritesResultCount.textContent = '';
    updateTabCounts();
    setFavoritesLoadState('');
  }

  async function loadUserBlogs(reset = false, requestToken = blogQueryToken) {
    if (blogsLoading) return;
    if (!reset && (!blogHasMore || !isBlogsTabActive())) return;
    if (reset) {
      resetBlogLoadingView();
    } else if (allBlogs.length) {
      setBlogLoadState('加载更多中…');
    } else {
      blogPlaceholder.style.display = 'block';
      blogPlaceholder.textContent = '博客内容加载中，请稍候…';
    }
    blogsLoading = true;
    if (reset) blogCursor = '';
    const res = await request(buildUserBlogUrl());
    blogsLoading = false;
    if (requestToken !== blogQueryToken) {
      if (pendingBlogReset) {
        pendingBlogReset = false;
        resetAndLoadUserBlogs();
      }
      return;
    }
    if (isUnauthorized(res)) {
      renderBlogLoginRequired();
      redirectToLogin();
      return;
    }
    if (res.code !== 0 || !res.data || !Array.isArray(res.data.list)) {
      if (!allBlogs.length) {
        blogPlaceholder.style.display = 'block';
        blogPlaceholder.textContent = res.message || '加载博客失败，请稍后再试';
        blogGrid.style.display = 'none';
        setBlogLoadState('');
      } else {
        setBlogLoadState(res.message || '加载失败，请稍后重试');
      }
      return;
    }
    const pageData = res.data;
    const nextList = Array.isArray(pageData.list) ? pageData.list : [];
    blogTotal = Math.max(0, Number(pageData.total || 0));
    blogHasMore = !!pageData.hasMore;
    blogCursor = blogHasMore && pageData.nextCursor ? String(pageData.nextCursor) : '';
    allBlogs = mergeBlogs(reset ? [] : allBlogs, nextList);
    blogsLoaded = true;
    renderBlogList();
    if (pendingBlogReset) {
      pendingBlogReset = false;
      resetAndLoadUserBlogs();
    }
  }

  function resetAndLoadLikedBlogs() {
    if (!isLikesTabActive()) {
      likesLoaded = false;
      likesCursor = '';
      likesTotal = 0;
      likesHasMore = true;
      likedBlogs = [];
      return;
    }
    if (likesLoading) {
      pendingLikesReset = true;
      likesQueryToken += 1;
      return;
    }
    pendingLikesReset = false;
    likesQueryToken += 1;
    loadLikedBlogs(true, likesQueryToken);
  }

  function resetAndLoadFavoriteBlogs() {
    if (!isFavoritesTabActive()) {
      favoritesLoaded = false;
      favoritesCursor = '';
      favoritesTotal = 0;
      favoritesHasMore = true;
      favoriteBlogs = [];
      return;
    }
    if (favoritesLoading) {
      pendingFavoritesReset = true;
      favoritesQueryToken += 1;
      return;
    }
    pendingFavoritesReset = false;
    favoritesQueryToken += 1;
    loadFavoriteBlogs(true, favoritesQueryToken);
  }

  function buildFavoriteBlogUrl() {
    const query = new URLSearchParams();
    if (pid) query.set('userId', pid);
    query.set('size', String(BLOG_PAGE_SIZE));
    if (favoritesCursor) query.set('cursor', favoritesCursor);
    return `/favorite/user?${query.toString()}`;

  async function loadFavoriteBlogs(reset = false, requestToken = favoritesQueryToken) {
    if (favoritesLoading) return;
    if (!reset && (!favoritesHasMore || !isFavoritesTabActive())) return;
    if (reset) {
      resetFavoritesLoadingView();
    } else if (favoriteBlogs.length) {
      setFavoritesLoadState('加载更多中…');
    } else {
      favoritesPlaceholder.style.display = 'block';
      favoritesPlaceholder.textContent = '收藏记录加载中，请稍候…';
    }
    favoritesLoading = true;
    if (reset) favoritesCursor = '';
    const res = await request(buildFavoriteBlogUrl());
    favoritesLoading = false;
    if (requestToken !== favoritesQueryToken) {
      if (pendingFavoritesReset) {
        pendingFavoritesReset = false;
        resetAndLoadFavoriteBlogs();
      }
      return;
    }
    if (isUnauthorized(res)) {
      renderFavoritesLoginRequired();
      redirectToLogin();
      return;
    }
    if (res.code !== 0 || !res.data || !Array.isArray(res.data.list)) {
      if (!favoriteBlogs.length) {
        favoritesPlaceholder.style.display = 'block';
        favoritesPlaceholder.textContent = res.message || '加载收藏记录失败，请稍后再试';
        favoritesGrid.style.display = 'none';
        setFavoritesLoadState('');
      } else {
        setFavoritesLoadState(res.message || '加载失败，请稍后重试');
      }
      return;
    }
    const pageData = res.data;
    const nextList = Array.isArray(pageData.list) ? pageData.list : [];
    favoritesTotal = Math.max(0, Number(pageData.total || 0));
    favoritesHasMore = !!pageData.hasMore;
    favoritesCursor = favoritesHasMore && pageData.nextCursor ? String(pageData.nextCursor) : '';
    favoriteBlogs = mergeBlogs(reset ? [] : favoriteBlogs, nextList);
    favoritesLoaded = true;
    renderFavoriteBlogList();
    if (pendingFavoritesReset) {
      pendingFavoritesReset = false;
      resetAndLoadFavoriteBlogs();
    }
  }

  function buildLikedBlogUrl() {
    const query = new URLSearchParams();
    if (pid) query.set('userId', pid);
    query.set('size', String(BLOG_PAGE_SIZE));
    if (likesCursor) query.set('cursor', likesCursor);
