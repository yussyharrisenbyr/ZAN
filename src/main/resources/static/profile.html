  async function loadLikedBlogs(reset = false, requestToken = likesQueryToken) {
    if (likesLoading) return;
    if (!reset && (!likesHasMore || !isLikesTabActive())) return;
    if (reset) {
      resetLikesLoadingView();
    } else if (likedBlogs.length) {
      setLikesLoadState('加载更多中…');
    } else {
      likesPlaceholder.style.display = 'block';
      likesPlaceholder.textContent = '点赞记录加载中，请稍候…';
    }
    likesLoading = true;
    if (reset) likesCursor = '';
    const res = await request(buildLikedBlogUrl());
    likesLoading = false;
    if (requestToken !== likesQueryToken) {
      if (pendingLikesReset) {
        pendingLikesReset = false;
        resetAndLoadLikedBlogs();
      }
      return;
    }
    if (isUnauthorized(res)) {
      renderLikesLoginRequired();
      redirectToLogin();
      return;
    }
    if (res.code !== 0 || !res.data || !Array.isArray(res.data.list)) {
      if (!likedBlogs.length) {
        likesPlaceholder.style.display = 'block';
        likesPlaceholder.textContent = res.message || '加载点赞记录失败，请稍后再试';
        likesGrid.style.display = 'none';
        setLikesLoadState('');
      } else {
        setLikesLoadState(res.message || '加载失败，请稍后重试');
      }
      return;
    }
    const pageData = res.data;
    const nextList = Array.isArray(pageData.list) ? pageData.list : [];
    likesTotal = Math.max(0, Number(pageData.total || 0));
    likesHasMore = !!pageData.hasMore;
    likesCursor = likesHasMore && pageData.nextCursor ? String(pageData.nextCursor) : '';
    likedBlogs = mergeBlogs(reset ? [] : likedBlogs, nextList);
    likesLoaded = true;
    renderLikedBlogList();
    if (pendingLikesReset) {
      pendingLikesReset = false;
      resetAndLoadLikedBlogs();
    }
  }

  function setBlogSort(sort) {
    if (!sort || blogSort === sort) return;
    blogSort = sort;
    document.querySelectorAll('.blog-filter-btn[data-sort]').forEach(btn => btn.classList.toggle('active', btn.dataset.sort === sort));
    resetAndLoadUserBlogs();
  }

  function setBlogKeyword(keyword) {
    const normalized = String(keyword || '').trim();
    clearTimeout(blogKeywordDebounceTimer);
    blogKeywordDebounceTimer = setTimeout(() => {
      if (blogKeyword === normalized && (blogsLoaded || blogsLoading)) return;
      blogKeyword = normalized;
      resetAndLoadUserBlogs();
    }, 280);
  }

  function mergeBlogs(existing, incoming) {
    const merged = [];
    const seen = new Set();
    [...(existing || []), ...(incoming || [])].forEach(blog => {
      const id = blog?.id;
      if (id == null || seen.has(id)) return;
      seen.add(id);
      merged.push(blog);
    });
    return merged;
  }

  function renderBlogList() {
    const hasAnyProfileBlogs = Number(currentProfile?.blogCount ?? currentProfile?.notesCount ?? 0) > 0;
    blogResultCount.textContent = '';
    updateTabCounts();
    if (!allBlogs.length) {
      blogTools.style.display = (hasAnyProfileBlogs || !!blogKeyword) ? 'flex' : 'none';
      blogGrid.style.display = 'none';
      blogPlaceholder.style.display = 'block';
      blogPlaceholder.textContent = blogKeyword ? '没有找到符合条件的博客' : '暂时还没有发布博客';
      setBlogLoadState('');
      return;
    }
    blogTools.style.display = 'flex';
    blogGrid.innerHTML = allBlogs.map(blog => renderBlogCard(blog, profileCanManage)).join('');
    blogGrid.querySelectorAll('.blog-cover').forEach(img => {
      if (img.complete) {
        handleBlogCoverLoad(img);
        return;
      }
      img.addEventListener('load', () => handleBlogCoverLoad(img), { once: true });
      img.addEventListener('error', requestBlogMasonryLayout, { once: true });
    });
    blogGrid.style.display = 'grid';
    blogPlaceholder.style.display = 'none';
    setBlogLoadState(blogHasMore ? '继续下滑加载更多' : '已经到底啦');
    requestBlogMasonryLayout();
    scheduleEmbedHeightReport();
  }

  function renderLikedBlogList() {
    likesResultCount.textContent = '';
    updateTabCounts();
    if (!likedBlogs.length) {
      likesTools.style.display = Number(currentProfile?.likesGivenCount || 0) > 0 ? 'flex' : 'none';
      likesGrid.style.display = 'none';
      likesPlaceholder.style.display = 'block';
      likesPlaceholder.textContent = '暂时还没有点赞记录';
      setLikesLoadState('');
      return;
    }
    likesTools.style.display = 'flex';
    likesGrid.innerHTML = likedBlogs.map(blog => renderBlogCard(blog, false, { recordLabel: formatThumbTime(blog.thumbTime) })).join('');
    likesGrid.querySelectorAll('.blog-cover').forEach(img => {
      if (img.complete) {
        handleBlogCoverLoad(img);
        return;
      }
      img.addEventListener('load', () => handleBlogCoverLoad(img), { once: true });
      img.addEventListener('error', requestLikesMasonryLayout, { once: true });
    });
    likesGrid.style.display = 'grid';
    likesPlaceholder.style.display = 'none';
    setLikesLoadState(likesHasMore ? '继续下滑加载更多' : '已经到底啦');
    requestLikesMasonryLayout();
    scheduleEmbedHeightReport();
  }

  function renderFavoriteBlogList() {
    favoritesResultCount.textContent = '';
    updateTabCounts();
    if (!favoriteBlogs.length) {
      favoritesTools.style.display = Number(currentProfile?.notesCount || 0) > 0 ? 'flex' : 'none';
      favoritesGrid.style.display = 'none';
      favoritesPlaceholder.style.display = 'block';
      favoritesPlaceholder.textContent = '暂时还没有收藏记录';
      setFavoritesLoadState('');
      return;
    }
    favoritesTools.style.display = 'flex';
    favoritesGrid.innerHTML = favoriteBlogs.map(blog => renderBlogCard(blog, false, { recordLabel: formatFavoriteTime(blog.favoriteTime) })).join('');
    favoritesGrid.querySelectorAll('.blog-cover').forEach(img => {
      if (img.complete) {
        handleBlogCoverLoad(img);
        return;
      }
      img.addEventListener('load', () => handleBlogCoverLoad(img), { once: true });
      img.addEventListener('error', requestFavoritesMasonryLayout, { once: true });
    });
    favoritesGrid.style.display = 'grid';
    favoritesPlaceholder.style.display = 'none';
    setFavoritesLoadState(favoritesHasMore ? '继续下滑加载更多' : '已经到底啦');
    requestFavoritesMasonryLayout();
    scheduleEmbedHeightReport();
  }

  function isSelfProfileView() {
    return !!(currentProfile?.self || (viewerId != null && currentProfile?.userId != null && String(viewerId) === String(currentProfile.userId)));
  }

  function updateProfileBlogCollections(blogId, hasThumb, thumbCount) {
    const blogIdStr = String(blogId);
    const apply = list => (list || []).map(item => {
      if (String(item?.id) !== blogIdStr) return item;
      return { ...item, hasThumb: !!hasThumb, thumbCount: Number(thumbCount || 0) };
    });
    allBlogs = apply(allBlogs);
    favoriteBlogs = apply(favoriteBlogs);
    likedBlogs = apply(likedBlogs);
  }

  function findProfileBlogSnapshot(blogId) {
    const blogIdStr = String(blogId);
    return [...allBlogs, ...favoriteBlogs, ...likedBlogs].find(item => String(item?.id) === blogIdStr) || null;
  }

  function syncOwnLikedCollection(blogId, shouldExist, snapshot) {
    if (!isSelfProfileView() || !likesLoaded) {
      return;
    }
    const blogIdStr = String(blogId);
    if (shouldExist) {
      if (!likedBlogs.some(item => String(item?.id) === blogIdStr) && snapshot) {
        likedBlogs = [{ ...snapshot, hasThumb: true, thumbTime: new Date().toISOString() }, ...likedBlogs];
        likesTotal += 1;
      }
      updateTabCounts();
      return;
    }
    const next = likedBlogs.filter(item => String(item?.id) !== blogIdStr);
    if (next.length !== likedBlogs.length) {
      likedBlogs = next;
      likesTotal = Math.max(0, likesTotal - 1);
    }
    updateTabCounts();
  }

  function updateProfileBlogLikeDom(blogId, hasThumb, thumbCount) {
    const blogIdStr = String(blogId);
    document.querySelectorAll(`[data-blog-like="${blogIdStr}"]`).forEach(button => {
      button.classList.toggle('liked', !!hasThumb);
      button.title = hasThumb ? '取消点赞' : '点赞';
    });
    document.querySelectorAll(`[data-blog-like-count="${blogIdStr}"]`).forEach(node => {
      node.textContent = formatNumber(thumbCount || 0);
    });
  }

  async function toggleProfileBlogThumb(event, blogId) {
    event?.stopPropagation?.();
    const blogIdStr = String(blogId);
    if (profileThumbPending.has(blogIdStr)) {
      return;
    }
    const snapshot = findProfileBlogSnapshot(blogId);
    if (!viewerId) {
      redirectToLogin();
      return;
    }
    if (!snapshot) {
      showToast('文章状态已变化，正在刷新列表');
      if (isBlogsTabActive()) await loadUserBlogs(true, ++blogQueryToken);
      else if (isFavoritesTabActive()) await loadFavoriteBlogs(true, ++favoritesQueryToken);
      else if (isLikesTabActive()) await loadLikedBlogs(true, ++likesQueryToken);
      return;
    }
    const previousCount = Number(snapshot.thumbCount || 0);
    const wasLiked = !!snapshot.hasThumb;
    const nextLiked = !wasLiked;
    const nextCount = Math.max(0, previousCount + (wasLiked ? -1 : 1));
    updateProfileBlogCollections(blogIdStr, nextLiked, nextCount);
    updateProfileBlogLikeDom(blogIdStr, nextLiked, nextCount);

    profileThumbPending.add(blogIdStr);
    try {
      const res = await request(wasLiked ? '/thumb/undo' : '/thumb/do', {
        method: 'POST',
        body: JSON.stringify({ blogId: blogIdStr })
      });

      if (isUnauthorized(res)) {
        updateProfileBlogCollections(blogIdStr, wasLiked, previousCount);
        updateProfileBlogLikeDom(blogIdStr, wasLiked, previousCount);
        redirectToLogin();
        return;
      }

      if (res.code !== 0 || !res.data) {
        updateProfileBlogCollections(blogIdStr, wasLiked, previousCount);
        updateProfileBlogLikeDom(blogIdStr, wasLiked, previousCount);
        showToast(res.message || '操作失败');
        return;
      }

      const finalHasThumb = !!res.data.hasThumb;
      const finalThumbCount = Number(res.data.thumbCount || 0);
      updateProfileBlogCollections(blogIdStr, finalHasThumb, finalThumbCount);
      syncOwnLikedCollection(blogIdStr, finalHasThumb, { ...snapshot, hasThumb: finalHasThumb, thumbCount: finalThumbCount });
      updateProfileBlogLikeDom(blogIdStr, finalHasThumb, finalThumbCount);

      if (isLikesTabActive() && isSelfProfileView() && !finalHasThumb) {
        renderLikedBlogList();
        return;
      }
      if (isBlogsTabActive()) {
        requestBlogMasonryLayout();
      } else if (isFavoritesTabActive()) {
        requestFavoritesMasonryLayout();
      } else if (isLikesTabActive()) {
        requestLikesMasonryLayout();
      }
    } finally {
      profileThumbPending.delete(blogIdStr);
    }
  }

  function requestBlogMasonryLayout() {
    if (blogGrid && !blogGrid.classList.contains('masonry-ready')) {
      blogGrid.classList.add('masonry-ready');
    }
    if (blogMasonryRaf) cancelAnimationFrame(blogMasonryRaf);
    blogMasonryRaf = requestAnimationFrame(layoutBlogMasonry);
  }

  function layoutBlogMasonry() {
    blogMasonryRaf = 0;
    if (!blogGrid || blogGrid.style.display === 'none') return;
    const styles = getComputedStyle(blogGrid);
    const rowSize = parseFloat(styles.getPropertyValue('--masonry-row')) || 8;
    const rowGap = parseFloat(styles.rowGap) || 24;
    blogGrid.querySelectorAll('.blog-card').forEach(card => {
      const cardHeight = card.getBoundingClientRect().height;
      const span = Math.max(1, Math.ceil((cardHeight + rowGap) / (rowSize + rowGap)));
      card.style.gridRowEnd = `span ${span}`;
    });
  }

  function requestLikesMasonryLayout() {
    if (likesGrid && !likesGrid.classList.contains('masonry-ready')) {
      likesGrid.classList.add('masonry-ready');
    }
    if (likesMasonryRaf) cancelAnimationFrame(likesMasonryRaf);
    likesMasonryRaf = requestAnimationFrame(layoutLikesMasonry);
  }

  function layoutLikesMasonry() {
    likesMasonryRaf = 0;
    if (!likesGrid || likesGrid.style.display === 'none') return;
    const styles = getComputedStyle(likesGrid);
    const rowSize = parseFloat(styles.getPropertyValue('--masonry-row')) || 8;
    const rowGap = parseFloat(styles.rowGap) || 24;
    likesGrid.querySelectorAll('.blog-card').forEach(card => {
      const cardHeight = card.getBoundingClientRect().height;
      const span = Math.max(1, Math.ceil((cardHeight + rowGap) / (rowSize + rowGap)));
      card.style.gridRowEnd = `span ${span}`;
    });
  }

  function requestFavoritesMasonryLayout() {
    if (favoritesGrid && !favoritesGrid.classList.contains('masonry-ready')) {
      favoritesGrid.classList.add('masonry-ready');
    }
    if (favoritesMasonryRaf) cancelAnimationFrame(favoritesMasonryRaf);
    favoritesMasonryRaf = requestAnimationFrame(layoutFavoritesMasonry);
  }

  function layoutFavoritesMasonry() {
    favoritesMasonryRaf = 0;
    if (!favoritesGrid || favoritesGrid.style.display === 'none') return;
    const styles = getComputedStyle(favoritesGrid);
    const rowSize = parseFloat(styles.getPropertyValue('--masonry-row')) || 8;
    const rowGap = parseFloat(styles.rowGap) || 24;
    favoritesGrid.querySelectorAll('.blog-card').forEach(card => {
      const cardHeight = card.getBoundingClientRect().height;
      const span = Math.max(1, Math.ceil((cardHeight + rowGap) / (rowSize + rowGap)));
      card.style.gridRowEnd = `span ${span}`;
    });
  }

  function renderDefaultMediaFallback(containerClass, tipText = '封面加载失败') {
    const tip = escapeHtml(tipText || '封面加载失败');
    return `
      <div class="${containerClass} media-fallback" aria-hidden="true">
        <div class="media-fallback-frame">
          <div class="media-fallback-art">
            <span class="media-fallback-line media-fallback-line-lg"></span>
            <span class="media-fallback-line media-fallback-line-md"></span>
            <span class="media-fallback-line media-fallback-line-sm"></span>
          </div>
          <div class="media-fallback-tip">${tip}</div>
        </div>
      </div>
    `;
  }

  function renderBlogCard(blog, canManage = false, options = {}) {
    const cover = normalizeCoverUrl(blog.coverImg);
    const blogId = encodeURIComponent(blog.id);
    const blogIdRaw = blog.id;
    const blogIdAttr = escapeAttr(String(blogIdRaw));
    const titlePlain = stripTags(blog.title || '未命名博客');
    const titleHtml = escapeHtml(titlePlain);
    const safeAuthor = escapeHtml(blog.authorName || '匿名');
    const authorInitial = (blog.authorName || titlePlain || 'U').trim().charAt(0).toUpperCase() || 'U';
    const authorAvatar = window.SiteAvatar?.renderHtml
      ? SiteAvatar.renderHtml('avatar', { authorAvatarUrl: blog.authorAvatarUrl, authorName: blog.authorName, avatarText: authorInitial })
      : `<div class="avatar">${authorInitial}</div>`;
    const likes = formatNumber(blog.thumbCount || 0);
    const hasThumb = !!blog.hasThumb;
    const created = blog.createTime ? new Date(blog.createTime).toLocaleDateString('zh-CN') : '';
    const recordLabel = options?.recordLabel ? `<div class="record-badge">${escapeHtml(options.recordLabel)}</div>` : '';
    const hasCover = !!cover;
    const likeButton = `
      <button class="card-like ${hasThumb ? 'liked' : ''}" type="button" data-blog-like="${blogIdAttr}" title="${hasThumb ? '取消点赞' : '点赞'}" onclick="toggleProfileBlogThumb(event,'${blogIdRaw}')">
        ${renderRoundedHeartIcon('heart')}
        <span class="cover-like-count" data-blog-like-count="${blogIdAttr}">${likes}</span>
      </button>`;
    const coverHtml = hasCover
      ? `
        <div class="card-media blog-cover-shell">
          <img class="card-cover blog-cover" src="${escapeAttr(cover)}" alt="${escapeAttr((blog.title || '博客') + '封面')}" loading="lazy" decoding="async" onload="handleBlogCoverLoad(this)" onerror="handleBlogCoverError(this)">
          ${renderDefaultMediaFallback('card-media-fallback blog-cover-fallback')}
        </div>`
      : `
        <div class="card-media blog-cover-shell text-card no-cover">
          <div class="card-text-shell blog-text-shell">
            <span class="card-text-quote top">“</span>
            <div class="card-text-content">
              <div class="card-text-title blog-text-title">${titleHtml}</div>
            </div>
            <span class="card-text-quote bottom">—</span>
          </div>
        </div>`;
    const contentHtml = `${recordLabel}${hasCover ? `<div class="card-title">${titleHtml}</div>` : ''}`;
    const openAction = isEmbeddedShell
      ? `window.top.location.href='/blog.html?id=${blogId}'`
      : `window.open('/blog.html?id=${blogId}','_blank')`;
    return `
      <article class="xhs-card blog-card ${hasCover ? '' : 'text-card'}" onclick="${openAction}">
        ${coverHtml}
        <div class="profile-card-content">
          ${contentHtml}
        </div>
        <div class="card-footer">
          <div class="card-author">
            ${authorAvatar}
            <div class="card-author-copy">
              <span class="card-author-name">${safeAuthor}</span>
              ${created ? `<span class="card-author-meta">${escapeHtml(created)}</span>` : ''}
            </div>
          </div>
          ${likeButton}
        </div>
        ${canManage ? `
        <div class="manage-btns">
          <div class="btn-edit" onclick="event.stopPropagation(); editBlog('${blogIdRaw}')">编辑</div>
          <div class="btn-del" onclick="event.stopPropagation(); deleteBlog('${blogIdRaw}')">删除</div>
        </div>` : ''}
      </article>`;
  }

  function renderRoundedHeartIcon(className = '') {
    const classes = ['heart-icon-svg', className].filter(Boolean).join(' ');
    return `<svg class="${classes}" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M12 21.35 10.55 20.03C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35Z"/></svg>`;
  }

  function renderProfileLoginRequired() {
    profileCanManage = false;
    profileCanEdit = false;
    document.getElementById('profileCard').innerHTML = '<div class="placeholder" style="width:100%;font-size:18px;">请登录后查看个人信息。</div>';
    scheduleEmbedHeightReport();
  }

  function renderBlogLoginRequired() {
    profileCanManage = false;
    profileCanEdit = false;
    allBlogs = [];
    blogCursor = '';
    blogTotal = 0;
    blogHasMore = false;
    blogTools.style.display = 'none';
    blogGrid.style.display = 'none';
    blogPlaceholder.style.display = 'block';
    blogPlaceholder.textContent = '请登录方能查看';
    blogResultCount.textContent = '';
    updateTabCounts();
    setBlogLoadState('');
    blogsLoaded = false;
    scheduleEmbedHeightReport();
  }

  function renderLikesLoginRequired() {
    likedBlogs = [];
    likesCursor = '';
    likesTotal = 0;
    likesHasMore = false;
    likesTools.style.display = 'none';
    likesGrid.style.display = 'none';
    likesPlaceholder.style.display = 'block';
    likesPlaceholder.textContent = '请登录方能查看';
    likesResultCount.textContent = '';
    updateTabCounts();
    setLikesLoadState('');
    likesLoaded = false;
    scheduleEmbedHeightReport();
  }

  function renderFavoritesLoginRequired() {
    favoriteBlogs = [];
    favoritesCursor = '';
    favoritesTotal = 0;
    favoritesHasMore = false;
    favoritesTools.style.display = 'none';
    favoritesGrid.style.display = 'none';
    favoritesPlaceholder.style.display = 'block';
    favoritesPlaceholder.textContent = '请登录方能查看';
    favoritesResultCount.textContent = '';
    updateTabCounts();
    setFavoritesLoadState('');
    favoritesLoaded = false;
    scheduleEmbedHeightReport();
  }

  function updateTabCounts() {
    if (tabBlogCount) {
      const blogCount = blogsLoaded ? blogTotal : Number(currentProfile?.blogCount ?? blogTotal ?? 0);
      tabBlogCount.textContent = formatNumber(blogCount);
    }
    if (tabFavoritesCount) {
      const favoriteCount = favoritesLoaded ? favoritesTotal : Number(currentProfile?.notesCount ?? favoritesTotal ?? 0);
      tabFavoritesCount.textContent = formatNumber(favoriteCount);
    }
    if (tabLikesCount) {
      const likeCount = likesLoaded ? likesTotal : Number(currentProfile?.likesGivenCount ?? likesTotal ?? 0);
      tabLikesCount.textContent = formatNumber(likeCount);
    }
  }

  function editBlog(blogId) {
    window.open(`/publish.html?id=${encodeURIComponent(blogId)}`, '_blank');
  }

  async function deleteBlog(blogId) {
    if (!profileCanManage) return showToast('暂无权限');
    if (!confirm('确定删除这篇博客吗？删除后无法恢复。')) return;
    const res = await request(`/blog/delete?blogId=${encodeURIComponent(blogId)}`, { method: 'DELETE' });
    if (isUnauthorized(res)) {
      renderBlogLoginRequired();
      showToast(res.message || '请先登录');
      return;
    }
    if (res.code !== 0) {
      showToast(res.message || '操作失败');
      return;
    }
    showToast('删除成功');
    if (currentProfile) {
      const nextBlogCount = Math.max(0, Number(currentProfile.blogCount ?? currentProfile.notesCount ?? 0) - 1);
      currentProfile.blogCount = nextBlogCount;
      currentProfile.notesCount = nextBlogCount;
      updateTabCounts();
    }
    resetAndLoadUserBlogs();
  }

  function isUnauthorized(res) {
    return !!res && (res.httpStatus === 401 || res.code === 401);
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  async function request(url, options = {}) {
    try {
      const response = await fetch(url, { credentials: 'include', headers: { 'Content-Type': 'application/json' }, ...options });
      let data = {};
      try {
        data = await response.json();
      } catch (err) {
        data = { code: -1, message: '响应解析失败' };
      }
      return { httpStatus: response.status, ...data };
    } catch (err) {
      return { httpStatus: 0, code: -1, message: '网络异常，请稍后重试' };
    }
  }

  function formatNumber(num) {
    const n = Number(num || 0);
    if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + 'w';
    return n.toLocaleString('zh-CN');
  }

  function stripTags(input) {
    return String(input || '').replace(/<[^>]*>/g, ' ');
  }

  function buildTextExcerpt(content, fallbackText = '') {
    const plain = stripTags(content || fallbackText || '').replace(/\s+/g, ' ').trim();
    if (!plain) return '打开文章继续阅读完整内容。';
    return plain.length > 56 ? `${plain.slice(0, 56)}…` : plain;
  }

  function formatAge(age) {
    const value = Number(age);
    return Number.isInteger(value) && value > 0 ? `${value} 岁` : '未填写';
  }

  function normalizeCoverUrl(url) {
    return typeof url === 'string' ? url.trim() : '';
  }

  function normalizeImageUrl(url) {
    return typeof url === 'string' ? url.trim() : '';
  }

  function handleBlogCoverLoad(img) {
    const shell = img?.closest('.blog-cover-shell');
    if (!shell) return;
    shell.classList.remove('media-landscape');
    const naturalWidth = Number(img.naturalWidth || 0);
    const naturalHeight = Number(img.naturalHeight || 0);
    if (naturalWidth && naturalHeight) {
      shell.classList.toggle('media-landscape', naturalWidth / naturalHeight > AUTO_ADAPT_LANDSCAPE_RATIO);
    }
    if (shell.closest('#favoritesGrid')) {
      requestFavoritesMasonryLayout();
      return;
    }
    if (shell.closest('#likesGrid')) {
      requestLikesMasonryLayout();
      return;
    }
    requestBlogMasonryLayout();
  }

  function handleBlogCoverError(img) {
    const shell = img?.closest('.blog-cover-shell');
    if (shell) shell.classList.add('is-fallback');
    if (shell?.closest('#favoritesGrid')) {
      requestFavoritesMasonryLayout();
      return;
    }
    if (shell?.closest('#likesGrid')) {
      requestLikesMasonryLayout();
      return;
    }
    requestBlogMasonryLayout();
  }

  function formatThumbTime(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return `点赞于 ${date.toLocaleDateString('zh-CN')}`;
  }

  function formatFavoriteTime(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return `收藏于 ${date.toLocaleDateString('zh-CN')}`;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
